<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>Su Ürünleri Müzesi AR</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    .alt-butonlar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 999;
    }

    .sayfa-butonu {
      color: white;
      padding: 15px 22px;
      border-radius: 25px;
      font-size: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      white-space: nowrap;
    }

    .oyun {
      background: #2b6cb0;
    }

    .test {
      background: #38a169;
    }
  </style>
</head>

<body>

  <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="kopekbaligiModel" src="kopekbaligi.glb"></a-asset-item>
      <a-asset-item id="palyacoModel" src="palyaco.glb"></a-asset-item>
      <a-asset-item id="mavitangModel" src="mavitang.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- KÖPEK BALIĞI -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#kopekbaligiModel" position="-0.45 0 0" scale="0.30 0.30 0.30">
      </a-gltf-model>

      <a-plane position="0.55 0 0" width="1.1" height="0.7" color="#ffffff" opacity="0.95">
      </a-plane>

      <a-text
        value="KOPEK BALIGI&#10;Okyanus ve denizlerde yasar.&#10;Etcil bir deniz canlisidir.&#10;Guclu koku alma duyusuna sahiptir."
        position="0.55 0.08 0.01" width="1.7" align="center" color="#000000">
      </a-text>
    </a-entity>

    <!-- PALYAÇO BALIĞI -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model src="#palyacoModel" position="-0.45 0 0" scale="0.35 0.35 0.35">
      </a-gltf-model>

      <a-plane position="0.55 0 0" width="1.1" height="0.7" color="#ffffff" opacity="0.95">
      </a-plane>

      <a-text
        value="PALYACO BALIGI&#10;Tropikal denizlerde yasar.&#10;Kucuk deniz canlilari ve yosunlarla beslenir.&#10;Nemo karakteriyle taninir."
        position="0.55 0.08 0.01" width="1.7" align="center" color="#000000">
      </a-text>
    </a-entity>

    <!-- MAVİ TANG -->
    <a-entity mindar-image-target="targetIndex: 2">
      <a-gltf-model src="#mavitangModel" position="-0.45 0 0" scale="0.02 0.02 0.02">
      </a-gltf-model>

      <a-plane position="0.55 0 0" width="1.1" height="0.7" color="#ffffff" opacity="0.95">
      </a-plane>

      <a-text
        value="MAVI TANG BALIGI&#10;Tropikal okyanuslarda yasar.&#10;Genellikle yosunlarla beslenir.&#10;Dory karakteriyle taninir."
        position="0.55 0.08 0.01" width="1.7" align="center" color="#000000">
      </a-text>
    </a-entity>

  </a-scene>

  <div class="alt-butonlar">
    <a href="oyun.html" class="sayfa-butonu oyun">🧩 Eşleştirme Oyunu</a>
    <a href="test.html" class="sayfa-butonu test">📝 Bilgi Testi</a>
  </div>

</body>

</html>
