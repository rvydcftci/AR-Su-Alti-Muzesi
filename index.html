<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>AR Su Altı Müzesi</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .baslik-panel {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      width: 90%;
      max-width: 420px;
      padding: 12px 16px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(0, 188, 212, 0.92), rgba(33, 150, 243, 0.92));
      color: white;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    .baslik-panel h1 {
      margin: 0;
      font-size: 20px;
    }

    .baslik-panel p {
      margin: 4px 0 0;
      font-size: 13px;
      opacity: 0.95;
    }

    .ses-butonu {
      position: fixed;
      top: 92px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #ff9800, #ff5722);
      color: white;
      border: none;
      padding: 13px 22px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      z-index: 1000;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    .ses-butonu.aktif {
      background: linear-gradient(135deg, #00c853, #009688);
    }

    .alt-butonlar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 999;
      width: 92%;
      max-width: 430px;
      justify-content: center;
    }

    .sayfa-butonu {
      flex: 1;
      color: white;
      padding: 14px 14px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      white-space: nowrap;
      border: 2px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(8px);
    }

    .oyun {
      background: linear-gradient(135deg, #7b1fa2, #512da8);
    }

    .test {
      background: linear-gradient(135deg, #00b894, #00a8ff);
    }

    .giris-ekrani {
      position: fixed;
      inset: 0;
      z-index: 3000;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.25), transparent 28%),
        linear-gradient(180deg, #00bcd4, #0277bd 55%, #004d73);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: white;
      text-align: center;
    }

    .giris-karti {
      width: 100%;
      max-width: 420px;
      padding: 28px 22px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .giris-karti .emoji {
      font-size: 58px;
      margin-bottom: 8px;
    }

    .giris-karti h2 {
      margin: 8px 0;
      font-size: 28px;
    }

    .giris-karti p {
      margin: 10px 0 18px;
      font-size: 16px;
      line-height: 1.45;
    }

    .baslat-butonu {
      width: 100%;
      border: none;
      border-radius: 28px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      color: #004d73;
      background: white;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
    }

    .ipucu {
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.95;
    }

    .baloncuk {
      position: fixed;
      bottom: -80px;
      width: 18px;
      height: 18px;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      animation: yukari 8s infinite ease-in;
      z-index: 2999;
    }

    .b1 {
      left: 12%;
      animation-delay: 0s;
    }

    .b2 {
      left: 28%;
      animation-delay: 2s;
      width: 12px;
      height: 12px;
    }

    .b3 {
      left: 68%;
      animation-delay: 1s;
      width: 22px;
      height: 22px;
    }

    .b4 {
      left: 84%;
      animation-delay: 3s;
      width: 14px;
      height: 14px;
    }

    @keyframes yukari {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translateY(-110vh) scale(1.5);
        opacity: 0;
      }
    }

    .durum-mesaji {
      position: fixed;
      left: 50%;
      bottom: 100px;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 10px 18px;
      border-radius: 22px;
      font-size: 14px;
      display: none;
      text-align: center;
    }

    .galeri-butonu {
      display: block;
      margin-top: 12px;
      text-decoration: none;
      background: linear-gradient(135deg, #ffeb3b, #ff9800);
      color: #004d73;
    }
  </style>
</head>

<body>

  <div id="girisEkrani" class="giris-ekrani">
    <div class="baloncuk b1"></div>
    <div class="baloncuk b2"></div>
    <div class="baloncuk b3"></div>
    <div class="baloncuk b4"></div>

    <div class="giris-karti">
      <div class="emoji">🐠🌊</div>
      <h2>AR Su Altı Müzesi</h2>
      <p>
        Balık kartını kameraya göster, 3D balıkları keşfet ve onların sesli tanıtımlarını dinle!
      </p>
      <button id="muzeyiBaslat" class="baslat-butonu">📷 AR Kamerayı Aç</button>

      <a href="galeri.html" class="baslat-butonu galeri-butonu">
        🐟 Balık Galerisi
      </a>
      <div class="ipucu">İpucu: Sesler için üstteki butona basmayı unutma 🔊</div>
    </div>
  </div>

  <div class="baslik-panel">
    <h1>🐟 AR Su Altı Müzesi</h1>
    <p>Kartı kameraya göster, balığı keşfet!</p>
  </div>

  <button id="sesBaslat" class="ses-butonu">🔊 Balık Seslerini Aç</button>

  <div id="durumMesaji" class="durum-mesaji">Balık algılandı!</div>

  <audio id="kopekbaligiSes" src="kopekbaligi.mp3"></audio>
  <audio id="palyacoSes" src="palyaco.mp3"></audio>
  <audio id="mavitangSes" src="mavitang.mp3"></audio>

  <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="kopekbaligiModel" src="kopekbaligi.glb"></a-asset-item>
      <a-asset-item id="palyacoModel" src="palyaco.glb"></a-asset-item>
      <a-asset-item id="mavitangModel" src="mavitang.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- KÖPEK BALIĞI -->
    <a-entity id="kopekbaligiTarget" mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#kopekbaligiModel" position="-0.45 0 0" scale="0.30 0.30 0.30">
      </a-gltf-model>

      <a-plane position="0.55 0 0" width="1.15" height="0.75" color="#E3F2FD" opacity="0.97">
      </a-plane>

      <a-text
        value="KOPEK BALIGI&#10;Okyanus ve denizlerde yasar.&#10;Etcil bir deniz canlisidir.&#10;Guclu koku alma duyusuna sahiptir."
        position="0.55 0.08 0.01" width="1.7" align="center" color="#0D47A1">
      </a-text>
    </a-entity>

    <!-- PALYAÇO BALIĞI -->
    <a-entity id="palyacoTarget" mindar-image-target="targetIndex: 1">
      <a-gltf-model src="#palyacoModel" position="-0.45 0 0" scale="0.35 0.35 0.35">
      </a-gltf-model>

      <a-plane position="0.55 0 0" width="1.15" height="0.75" color="#FFF3E0" opacity="0.97">
      </a-plane>

      <a-text
        value="PALYACO BALIGI&#10;Tropikal denizlerde yasar.&#10;Kucuk deniz canlilari ve yosunlarla beslenir.&#10;Deniz sakayiklari arasinda yasar."
        position="0.55 0.08 0.01" width="1.7" align="center" color="#E65100">
      </a-text>
    </a-entity>

    <!-- MAVİ TANG -->
    <a-entity id="mavitangTarget" mindar-image-target="targetIndex: 2">
      <a-gltf-model src="#mavitangModel" position="-0.45 0 0" scale="0.02 0.02 0.02">
      </a-gltf-model>

      <a-plane position="0.55 0 0" width="1.15" height="0.75" color="#E1F5FE" opacity="0.97">
      </a-plane>

      <a-text
        value="MAVI TANG BALIGI&#10;Tropikal okyanuslarda yasar.&#10;Genellikle yosunlarla beslenir.&#10;Parlak mavi rengiyle taninir."
        position="0.55 0.08 0.01" width="1.7" align="center" color="#01579B">
      </a-text>
    </a-entity>

  </a-scene>

  <div class="alt-butonlar">
    <a href="oyun.html" class="sayfa-butonu oyun">🧩 Eşleştirme</a>
    <a href="test.html" class="sayfa-butonu test">📝 Bilgi Testi</a>
  </div>

  <script>
    let sesAktif = false;

    const sesler = {
      kopekbaligi: document.getElementById("kopekbaligiSes"),
      palyaco: document.getElementById("palyacoSes"),
      mavitang: document.getElementById("mavitangSes")
    };

    const durumMesaji = document.getElementById("durumMesaji");

    function mesajGoster(mesaj) {
      durumMesaji.innerText = mesaj;
      durumMesaji.style.display = "block";

      setTimeout(() => {
        durumMesaji.style.display = "none";
      }, 1800);
    }

    function tumSesleriDurdur() {
      Object.values(sesler).forEach((ses) => {
        ses.pause();
        ses.currentTime = 0;
      });
    }

    function sesCal(ses, mesaj) {
      mesajGoster(mesaj);

      if (!sesAktif) return;

      tumSesleriDurdur();
      ses.currentTime = 0;
      ses.play().catch(() => {
        console.log("Ses oynatılamadı.");
      });
    }

    document.getElementById("muzeyiBaslat").addEventListener("click", () => {
      document.getElementById("girisEkrani").style.display = "none";
    });

    document.getElementById("sesBaslat").addEventListener("click", () => {
      sesAktif = true;
      const buton = document.getElementById("sesBaslat");
      buton.innerText = "✅ Sesler Aktif";
      buton.classList.add("aktif");
      mesajGoster("Sesler açıldı. Şimdi bir balık kartı okut!");
    });

    document.querySelector("#kopekbaligiTarget").addEventListener("targetFound", () => {
      sesCal(sesler.kopekbaligi, "🦈 Köpek balığı bulundu!");
    });

    document.querySelector("#palyacoTarget").addEventListener("targetFound", () => {
      sesCal(sesler.palyaco, "🐠 Palyaço balığı bulundu!");
    });

    document.querySelector("#mavitangTarget").addEventListener("targetFound", () => {
      sesCal(sesler.mavitang, "🐟 Mavi Tang bulundu!");
    });

    document.querySelector("#kopekbaligiTarget").addEventListener("targetLost", tumSesleriDurdur);
    document.querySelector("#palyacoTarget").addEventListener("targetLost", tumSesleriDurdur);
    document.querySelector("#mavitangTarget").addEventListener("targetLost", tumSesleriDurdur);
  </script>

</body>

</html>
